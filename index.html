<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Tools</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:#07090d;
  color:#dce8f5;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.container{max-width:600px;width:100%;text-align:center}
h1{font-size:28px;margin-bottom:12px;font-weight:700}
p{color:#8fa0b8;font-size:14px;margin-bottom:40px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:20px}
a.card{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:36px 20px;
  background:#0c1018;
  border:1px solid #182030;
  border-radius:12px;
  text-decoration:none;
  color:#dce8f5;
  transition:all .2s;
}
a.card:hover{border-color:#00ccff;background:#0e1420;transform:translateY(-3px)}
.card-icon{font-size:36px;margin-bottom:14px}
.card-title{font-size:16px;font-weight:600;margin-bottom:6px}
.card-desc{font-size:12px;color:#8fa0b8}
@media(max-width:500px){.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <h1>Trading Tools</h1>
  <p>crypto trading utilities</p>
  <div class="cards">
    <a class="card" href="/tools/position-calculator/">
      <div class="card-icon">🎯</div>
      <div class="card-title">仓位计算器</div>
      <div class="card-desc">Position Calculator</div>
    </a>
    <a class="card" href="/tools/rolling-calculator.html">
      <div class="card-icon">📈</div>
      <div class="card-title">滚仓计算器</div>
      <div class="card-desc">Rolling Position Simulator</div>
    </a>
  </div>
</div>
</body>
</html>
